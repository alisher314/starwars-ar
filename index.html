<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Wars AR for Malika</title>
    
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Стили для космической кнопки запуска */
        #ar-button {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background-color: #000;
            color: #FFC500;
            border: 2px solid #FFC500;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #FFC500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        #ar-button:active {
            transform: translateX(-50%) scale(0.95);
            box-shadow: 0 0 5px #FFC500;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden; background-color: #000;">

    <button id="ar-button">ДА ПРЕБУДЕТ С ТОБОЙ СИЛА</button>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;'>
        
        <a-assets>
            <audio id="swTheme" src="starwars.mp3" preload="auto" crossorigin="anonymous"></audio>
            <audio id="r2d2Sound" src="r2d2.mp3" preload="auto" crossorigin="anonymous"></audio>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-entity rotation="-60 0 0" position="0 0 0">
                
                <a-text 
                    value="В далекой-далекой галактике маленький R2D2 уловил странный сигнал...\n\nЭто была не просьба о помощи.\nНе сигнал бедствия.\nИ даже не сообщение Повстанцев.\n\nЭто была потеря энергии одной очень уставшей джедайки \n\nСканеры показали:\n- слишком много учебы,\n- слишком мало отдыха,\n- критически низкий уровень сладостей,\n- и опасное снижение мидихлорианов.\n\nТогда R2D2 тайно покинул базу Сопротивления и отправился через тысячи звездных систем, чтобы доставить особый груз прямо на планету Земля.\n\nМиссия:\n«Вернуть немного Силы Малике» \n\nИмперия сладостей наносит ответный удар \nДа пребудет с тобой Сила."
                    align="center"
                    color="#FFC500" 
                    font="monospace"
                    width="4"
                    wrap-count="30"
                    animation="property: position; from: 0 -2 -0.5; to: 0 4 -3; dur: 22000; loop: true; easing: linear">
                </a-text>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#ar-button');
        const theme = document.querySelector('#swTheme');
        const r2d2 = document.querySelector('#r2d2Sound');

        btn.addEventListener('click', () => {
            theme.play().catch(err => console.log("Ошибка темы:", err));
            r2d2.play().catch(err => console.log("Ошибка R2-D2:", err));
            btn.style.display = 'none';
        });
    </script>
</body>
</html>
