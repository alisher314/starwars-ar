<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Wars AR for Malika</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Космическая кнопка */
        #ar-button {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background-color: #000;
            color: #FFC500;
            border: 2px solid #FFC500;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #FFC500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        #ar-button:active {
            transform: translateX(-50%) scale(0.95);
            box-shadow: 0 0 5px #FFC500;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden; background-color: #000;">

    <button id="ar-button">ДА ПРЕБУДЕТ С ТОБОЙ СИЛА</button>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;'>
        
        <a-assets>
            <video 
                id="swVideo" 
                src="starwars.mp4" 
                preload="auto" 
                loop="true" 
                crossorigin="anonymous" 
                playsinline 
                webkit-playsinline>
            </video>
            
            <audio id="r2d2Sound" src="r2d2.mp3" preload="auto" crossorigin="anonymous"></audio>
        </a-assets>

        <a-marker preset="hiro">
            <a-video 
                src="#swVideo" 
                width="3" 
                height="1.68" 
                rotation="-90 0 0" 
                position="0 0 0">
            </a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#ar-button');
        const video = document.querySelector('#swVideo');
        const r2d2 = document.querySelector('#r2d2Sound');

        // Одновременный запуск видео и звука R2-D2 по клику
        btn.addEventListener('click', () => {
            // Запускаем видео со встроенным звуком
            video.play().catch(err => console.log("Ошибка видео:", err));
            
            // Запускаем писк R2-D2 поверх видео
            r2d2.play().catch(err => console.log("Ошибка R2-D2:", err));
            
            btn.style.display = 'none'; // Скрываем кнопку
        });
    </script>
</body>
</html>
